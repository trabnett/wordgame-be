services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wordgame
      POSTGRES_USER: wordgame
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8181:8181"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PASSWORD: postgres
    depends_on:
      - db

volumes:
  pgdata:
