services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: wordgame
      POSTGRES_USER: wordgame
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "8181:8181"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PASSWORD: postgres
      REDIS_HOST: redis
    depends_on:
      - db
      - redis

volumes:
  pgdata:
